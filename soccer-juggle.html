<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Juggle Keeper</title>
    <style>
      :root {
        color-scheme: dark;
        --night: #081510;
        --field: #17643d;
        --field-alt: #125635;
        --line: rgba(255, 255, 255, 0.18);
        --text: #f8fff8;
        --muted: #b7c8bd;
        --lime: #9df27a;
        --gold: #f5ce5b;
        --panel: rgba(5, 18, 13, 0.82);
        --danger: #ff725f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 8%, rgba(157, 242, 122, 0.16), transparent 24%),
          linear-gradient(180deg, #163a36 0%, var(--night) 100%);
        color: var(--text);
        font-family: "Malgun Gothic", "Segoe UI", system-ui, sans-serif;
      }

      button {
        min-width: 44px;
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: var(--gold);
        color: #172112;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:active {
        transform: translateY(1px);
      }

      .game-shell {
        display: grid;
        min-height: 100dvh;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .hud {
        display: grid;
        grid-template-columns: minmax(130px, 1fr) repeat(3, minmax(72px, 110px)) auto;
        align-items: center;
        gap: 8px;
        padding: 10px clamp(10px, 2.4vw, 18px);
        border-bottom: 1px solid var(--line);
        background: rgba(5, 18, 13, 0.9);
        backdrop-filter: blur(10px);
      }

      .brand {
        min-width: 0;
      }

      .brand strong {
        display: block;
        overflow: hidden;
        color: var(--lime);
        font-size: 17px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand span {
        display: block;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stat {
        min-width: 0;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .stat span {
        display: block;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stat b {
        display: block;
        overflow: hidden;
        font-size: 18px;
        line-height: 1.1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stage {
        position: relative;
        min-height: 0;
      }

      #juggleCanvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .overlay {
        position: absolute;
        left: 50%;
        top: 50%;
        display: grid;
        width: min(340px, calc(100% - 32px));
        gap: 12px;
        justify-items: center;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(5, 18, 13, 0.88);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
        text-align: center;
        transform: translate(-50%, -50%);
      }

      .overlay[hidden] {
        display: none;
      }

      .overlay h1 {
        margin: 0;
        color: var(--lime);
        font-size: clamp(30px, 7vw, 48px);
        line-height: 1;
      }

      .overlay p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .tap-hint {
        position: absolute;
        left: 50%;
        bottom: max(16px, env(safe-area-inset-bottom));
        width: min(420px, calc(100% - 32px));
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        background: rgba(5, 18, 13, 0.7);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        text-align: center;
        transform: translateX(-50%);
        pointer-events: none;
      }

      @media (max-width: 760px) {
        .hud {
          grid-template-columns: 1fr repeat(2, minmax(64px, 82px));
        }

        .brand span,
        .stat:nth-of-type(3) {
          display: none;
        }

        .restart-button {
          grid-column: 1 / -1;
          width: 100%;
          min-height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-shell">
      <header class="hud" aria-label="Juggle Keeper status">
        <div class="brand">
          <strong>Juggle Keeper</strong>
          <span>공을 떨어뜨리지 말고 계속 리프팅</span>
        </div>
        <div class="stat">
          <span>Juggles</span>
          <b id="count">0</b>
        </div>
        <div class="stat">
          <span>Best</span>
          <b id="best">0</b>
        </div>
        <div class="stat">
          <span>Status</span>
          <b id="phase">ready</b>
        </div>
        <button class="restart-button" id="restartButton" type="button">재시작</button>
      </header>

      <main class="stage" aria-label="Juggle Keeper game">
        <canvas id="juggleCanvas"></canvas>
        <section class="overlay" id="overlay" aria-live="polite">
          <h1 id="overlayTitle">Juggle Keeper</h1>
          <p id="overlayText">공을 터치하면 리프팅이 시작됩니다. 공의 왼쪽을 치면 오른쪽으로, 오른쪽을 치면 왼쪽으로 튑니다.</p>
          <button id="startButton" type="button">시작</button>
        </section>
        <div class="tap-hint" id="hint">공이 바닥에 닿기 전에 다시 터치하세요</div>
      </main>
    </div>

    <script type="module" src="./src/juggle-main.mjs"></script>
  </body>
</html>
