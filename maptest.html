<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>카카오맵 테스트</title>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=7620a85acc48c83e31715bb81fb0e3b3"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
    }

    #map{
      width:100%;
      height:100vh;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  const container = document.getElementById('map');

  const options = {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 3
  };

  const map = new kakao.maps.Map(container, options);
</script>

</body>
