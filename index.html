<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생각나는대로</title>
  <style>
    :root {
      --sky-top: #89cfff;
      --sky-mid: #b8e4ff;
      --sky-bottom: #eef8ff;
      --cloud: rgba(255, 255, 255, 0.8);
      --cloud-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(28, 73, 122, 0.12);
      --ink: #173b5c;
      --muted: rgba(23, 59, 92, 0.72);
      --accent: #2f84c6;
      --hero-deep: #143a63;
      --hero-mid: #1d4e7f;
      --hero-soft: #2c699c;
      --shadow: 0 26px 64px rgba(43, 110, 167, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Malgun Gothic", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 255, 255, 0.58), transparent 18%),
        radial-gradient(circle at 82% 14%, rgba(255, 255, 255, 0.5), transparent 16%),
        radial-gradient(circle at 74% 76%, rgba(255, 255, 255, 0.42), transparent 18%),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 42%, var(--sky-bottom) 100%);
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.14));
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      padding: 56px 36px 38px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 26%),
        linear-gradient(135deg, var(--hero-deep), var(--hero-mid) 56%, var(--hero-soft));
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.12);
      filter: blur(2px);
      pointer-events: none;
    }

    .hero::before {
      width: 220px;
      height: 90px;
      top: 34px;
      right: 52px;
      border-radius: 999px;
      box-shadow:
        -52px 14px 0 12px rgba(255, 255, 255, 0.08),
        42px 8px 0 4px rgba(255, 255, 255, 0.07);
    }

    .hero::after {
      width: 160px;
      height: 66px;
      bottom: 18px;
      left: 48px;
      border-radius: 999px;
      box-shadow:
        40px -8px 0 10px rgba(255, 255, 255, 0.06),
        -26px 4px 0 2px rgba(255, 255, 255, 0.05);
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 12px;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(232, 245, 255, 0.9);
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      line-height: 0.96;
      color: #ffffff;
      text-shadow: 0 16px 32px rgba(7, 26, 48, 0.28);
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      margin: 18px 0 0;
      max-width: 640px;
      line-height: 1.8;
      color: rgba(239, 248, 255, 0.96);
    }

    .hero-note {
      position: relative;
      z-index: 1;
      display: inline-flex;
      margin-top: 22px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #f3faff;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .content {
      padding: 30px;
      display: grid;
      gap: 20px;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      position: relative;
      padding: 26px 24px 24px;
      border-radius: 30px;
      background: var(--cloud);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: 0 18px 42px rgba(50, 116, 169, 0.12);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px auto auto 18px;
      width: 58px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.36);
    }

    .status {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .status.live {
      background: rgba(47, 132, 198, 0.12);
      color: var(--accent);
    }

    .status.wait {
      background: rgba(23, 59, 92, 0.08);
      color: var(--muted);
    }

    .card h3 {
      margin: 18px 0 0;
      font-size: 1.4rem;
    }

    .card p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 20px;
      padding: 13px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button.primary {
      color: #ffffff;
      background: linear-gradient(135deg, #47a6eb, #2f84c6);
      box-shadow: 0 14px 26px rgba(47, 132, 198, 0.24);
    }

    .button.secondary {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(47, 132, 198, 0.12);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .hero,
      .content,
      .card {
        padding-left: 20px;
        padding-right: 20px;
      }

      .hero {
        padding-top: 42px;
        padding-bottom: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Thinking Hub</p>
      <h1>생각나는대로</h1>
      <p class="hero-copy">
        생각나는대로 시도해보는 곳
      </p>
      <span class="hero-note">무언가 떠오르면 여기서 시작</span>
    </section>

    <section class="content">
      <section class="grid" aria-label="기능 목록">
        <article class="card">
          <span class="status live">현재 사용 가능</span>
          <h3>간식 추천</h3>
          <p>
            랜덤으로 종류를 고르고, 다음 단계에서 세부 메뉴까지 이어서 추천하는 페이지입니다.
          </p>
          <a class="button primary" href="./dessert.html">페이지 열기</a>
        </article>

        <article class="card">
          <span class="status wait">추가 예정</span>
          <h3>다음 생각</h3>
          <p>
            아이디어 추천 좀 해주세요
          </p>
          <span class="button secondary">준비 중</span>
        </article>

        <article class="card">
          <span class="status wait">추가 예정</span>
          <h3>또 다른 생각</h3>
          <p>
            뭐든지 시도해보시게
          </p>
          <span class="button secondary">자리만 확보</span>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
