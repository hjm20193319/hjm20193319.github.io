<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 번호 생성기</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f7fa;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }
    .numbers {
      margin-top: 20px;
    }
    .back {
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🎰 로또 번호 생성기</h1>

    <p id="today"></p>
    <p id="drawDate"></p>

    <button onclick="generateLotto()">번호 생성 🎲</button>

    <div class="numbers" id="result"></div>

    <a class="back" href="index.html">← 메인으로 돌아가기</a>
  </div>

  <script>
    const todayEl = document.getElementById("today");
    const drawEl = document.getElementById("drawDate");

    const today = new Date();
    todayEl.innerText = "📅 오늘 날짜: " + today.toLocaleDateString();

    const day = today.getDay();
    const diff = 6 - day;
    const saturday = new Date(today);
    saturday.setDate(today.getDate() + diff);

    drawEl.innerText = "📢 이번주 로또 발표일: " + saturday.toLocaleDateString();

    function generateLotto() {
      const resultEl = document.getElementById("result");
      resultEl.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        let numbers = [];

        while (numbers.length < 6) {
          let num = Math.floor(Math.random() * 45) + 1;
          if (!numbers.includes(num)) numbers.push(num);
        }

        numbers.sort((a, b) => a - b);

        const line = document.createElement("div");
        line.innerText = `조합 ${i + 1}: ${numbers.join(", ")}`;
        resultEl.appendChild(line);
      }
    }
  </script>

</body>
</html>
