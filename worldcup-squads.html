<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>스쿼드 | 2026 북중미 월드컵</title>
    <link rel="stylesheet" href="./worldcup.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./worldcup.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>2026 북중미 월드컵</span>
      </a>
      <nav class="nav" aria-label="월드컵 메뉴">
        <a href="./worldcup-matches.html">대진표</a>
        <a href="./worldcup-groups.html">진출 가능성</a>
        <a class="is-active" href="./worldcup-squads.html">스쿼드</a>
        <a href="./worldcup-records.html">개인 기록</a>
      </nav>
    </header>

    <main class="page">
      <div class="page-head">
        <h1>스쿼드</h1>
        <a class="back-link" href="./worldcup.html">월드컵</a>
      </div>
      <section class="squad-page-layout">
        <aside class="team-picker" id="teamPicker"></aside>
        <article class="panel" id="squadDetail" aria-live="polite"></article>
      </section>
    </main>

    <script type="module">
      import { squads } from "./worldcup-data.js";

      let selectedTeam = squads[0].team;

      function renderSquadPicker() {
        const picker = document.getElementById("teamPicker");
        picker.innerHTML = squads.map((team) => `
          <button type="button" class="${team.team === selectedTeam ? "is-active" : ""}" data-team="${team.team}">
            <span>${team.team}</span><span>Group ${team.group}</span>
          </button>
        `).join("");
        picker.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            selectedTeam = button.dataset.team;
            renderSquadPicker();
            renderSquadDetail();
          });
        });
      }

      function renderSquadDetail() {
        const team = squads.find((item) => item.team === selectedTeam);
        const totals = team.players.reduce((sum, player) => {
          sum.goals += player[2];
          sum.assists += player[3];
          sum.yellows += player[4];
          sum.saves += player[5];
          return sum;
        }, { goals: 0, assists: 0, yellows: 0, saves: 0 });
        document.getElementById("squadDetail").innerHTML = `
          <div class="coach-card">
            <div>
              <span class="status-tag">Group ${team.group}</span>
              <h2>${team.team}</h2>
              <div class="team-sub">감독 ${team.coach}</div>
            </div>
            <div class="team-total">
              <div class="metric"><b>${totals.goals}</b><span>득점</span></div>
              <div class="metric"><b>${totals.assists}</b><span>도움</span></div>
              <div class="metric"><b>${totals.yellows}</b><span>경고</span></div>
            </div>
          </div>
          <ul class="squad-list">
            <li><span class="tiny-label">선수</span><span class="tiny-label">득점</span><span class="tiny-label">도움</span><span class="tiny-label">경고</span><span class="tiny-label">세이브</span></li>
            ${team.players.map((player) => `
              <li>
                <span class="player-name"><b>${player[0]}</b><span>${player[1]}</span></span>
                <b>${player[2]}</b>
                <b>${player[3]}</b>
                <b>${player[4]}</b>
                <b>${player[5]}</b>
              </li>
            `).join("")}
          </ul>
        `;
      }

      renderSquadPicker();
      renderSquadDetail();
    </script>
  </body>
</html>
