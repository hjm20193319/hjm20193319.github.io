<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09050d">
  <title>오늘 어디 조질까? | 운동 부위 가챠</title>
  <style>
    :root {
      --bg: #09050d;
      --ink: #fffaf1;
      --muted: #b8aabd;
      --hot: #ff174f;
      --pink: #f4087d;
      --orange: #ff6b00;
      --yellow: #ffd323;
      --cyan: #09d9ee;
      --snap: cubic-bezier(.18,.82,.2,1);
    }

    * { box-sizing: border-box; }
    html { color-scheme: dark; background: #030207; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: "Arial Black", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at 78% 15%, rgba(244,8,125,.2), transparent 25rem),
        radial-gradient(circle at 8% 88%, rgba(255,107,0,.2), transparent 24rem),
        linear-gradient(135deg, #130914, #030207 48%, #100511);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      opacity: .34;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.32) 0 1px, transparent 1.5px),
        repeating-linear-gradient(112deg, transparent 0 36px, rgba(255,23,79,.11) 37px 38px, transparent 39px 72px);
      background-size: 12px 12px, auto;
      mask-image: linear-gradient(black, transparent 88%);
    }

    button, a { -webkit-tap-highlight-color: transparent; }
    button { font: inherit; }
    .app {
      width: min(1440px, 100%);
      min-height: 100vh;
      min-height: 100svh;
      margin: auto;
      padding: max(18px, env(safe-area-inset-top)) max(22px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(22px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid rgba(255,23,79,.25);
    }

    .brand, .hub-link { display: inline-flex; align-items: center; text-decoration: none; }
    .brand { gap: 10px; color: var(--ink); font-size: .8rem; letter-spacing: .12em; transform: skew(-7deg); }
    .brand-mark {
      width: 35px;
      height: 35px;
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      clip-path: polygon(42% 0,100% 0,64% 39%,91% 39%,24% 100%,40% 55%,8% 55%);
      filter: drop-shadow(0 0 12px rgba(255,107,0,.7));
    }
    .hub-link { gap: 8px; min-height: 42px; color: var(--cyan); font-size: .86rem; border-bottom: 2px solid transparent; }
    .hub-link:hover, .hub-link:focus-visible { color: #b9f8ff; border-color: var(--cyan); }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(230px,.72fr) minmax(540px,1.65fr) minmax(210px,.62fr);
      gap: clamp(18px,2.3vw,38px);
      align-items: center;
      padding: clamp(26px,4vh,54px) 0 18px;
    }

    .intro { align-self: stretch; display: flex; flex-direction: column; justify-content: center; position: relative; padding-left: clamp(4px,2vw,28px); }
    .intro::before {
      content: "";
      position: absolute;
      inset: 9% auto 8% -38%;
      width: 115%;
      z-index: -1;
      transform: skew(-10deg) rotate(-5deg);
      background:
        linear-gradient(170deg, transparent 0 25%, rgba(244,8,125,.22) 26% 56%, transparent 57%),
        repeating-radial-gradient(circle at 35% 50%, rgba(255,23,79,.55) 0 2px, transparent 2px 9px);
      mask-image: linear-gradient(90deg, transparent, black 24% 76%, transparent);
    }
    h1 {
      margin: 0;
      max-width: 360px;
      font-family: Impact, "Arial Black", "Malgun Gothic", sans-serif;
      font-size: clamp(3.2rem,6.5vw,7rem);
      line-height: .87;
      letter-spacing: -.08em;
      transform: skew(-5deg) rotate(-2deg);
      text-wrap: balance;
      text-shadow: 4px 5px #4c071b, 8px 10px rgba(0,0,0,.52), 0 0 36px rgba(255,23,79,.32);
    }
    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(var(--yellow) 5%, var(--orange) 58%, var(--hot));
      background-clip: text;
      -webkit-background-clip: text;
    }
    .intro-copy {
      width: min(280px,100%);
      margin: 28px 0 0;
      color: var(--muted);
      font-family: "Malgun Gothic", sans-serif;
      font-size: .93rem;
      font-weight: 700;
      line-height: 1.65;
      letter-spacing: -.03em;
    }
    .candidate-box {
      margin-top: 28px;
      padding: 17px;
      position: relative;
      border: 1px solid rgba(9,217,238,.55);
      background: rgba(3,2,7,.74);
      box-shadow: 9px 9px rgba(9,217,238,.08);
      transform: rotate(.7deg);
    }
    .candidate-box::before, .candidate-box::after { content: ""; position: absolute; width: 12px; height: 12px; border: solid var(--cyan); }
    .candidate-box::before { left: -1px; top: -1px; border-width: 3px 0 0 3px; }
    .candidate-box::after { right: -1px; bottom: -1px; border-width: 0 3px 3px 0; }
    .candidate-label { display: block; color: var(--cyan); font-size: .72rem; letter-spacing: .08em; }
    .candidate-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 7px; font: 900 .9rem/1.3 "Malgun Gothic", sans-serif; }
    .candidate-list span { padding-right: 8px; border-right: 1px solid rgba(255,255,255,.2); }
    .candidate-list span:last-child { border: 0; }

    .game { align-self: stretch; min-width: 0; display: grid; grid-template-rows: auto 1fr; }
    .selector { position: relative; z-index: 8; }
    .selector-head { display: flex; justify-content: space-between; gap: 18px; align-items: end; margin-bottom: 12px; }
    .selector h2 { margin: 0; font-size: clamp(1.12rem,2vw,1.55rem); line-height: 1.2; letter-spacing: -.05em; }
    .selector h2 em { color: var(--yellow); font-style: normal; }
    .reset-button {
      flex: none;
      padding: 7px 0;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.25);
      color: var(--muted);
      background: transparent;
      font: 800 .77rem/1 "Malgun Gothic", sans-serif;
      cursor: pointer;
    }
    .reset-button:hover, .reset-button:focus-visible { color: var(--ink); border-color: var(--ink); }
    .workout-options { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .workout-button {
      min-height: 72px;
      position: relative;
      overflow: hidden;
      padding: 14px 10px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 7px;
      color: var(--ink);
      background: linear-gradient(115deg,rgba(255,255,255,.09),transparent 38%), linear-gradient(#24232a,#111017);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.42), 0 8px 22px rgba(0,0,0,.3);
      font-size: clamp(1rem,1.6vw,1.35rem);
      font-weight: 900;
      letter-spacing: -.06em;
      cursor: pointer;
      isolation: isolate;
      transition: .18s var(--snap);
    }
    .workout-button::before { content: attr(data-index); position: absolute; left: 8px; top: 7px; z-index: -1; color: rgba(255,255,255,.12); font: 900 1rem Impact,sans-serif; }
    .workout-button::after {
      content: "최근 운동";
      position: absolute;
      inset: 27px -12px auto;
      padding: 5px;
      color: #fff;
      background: var(--hot);
      font: 900 .65rem/1 "Malgun Gothic",sans-serif;
      letter-spacing: .06em;
      opacity: 0;
      transform: rotate(-12deg) scaleX(.5);
      transition: .25s var(--snap);
    }
    .workout-button:hover { transform: translateY(-3px); border-color: rgba(255,211,35,.75); }
    .workout-button[aria-pressed="true"] {
      border-color: var(--hot);
      transform: rotate(-1deg);
      background: repeating-linear-gradient(130deg,rgba(255,23,79,.14) 0 8px,transparent 8px 16px), linear-gradient(#421225,#1c0a14);
      box-shadow: inset 0 0 0 2px rgba(255,23,79,.28), 0 0 24px rgba(255,23,79,.48);
    }
    .workout-button[aria-pressed="true"]::after { opacity: 1; transform: rotate(-8deg) scaleX(1); }
    .workout-button:focus-visible, .draw-button:focus-visible, .again-button:focus-visible, .close-result:focus-visible { outline: 3px solid var(--cyan); outline-offset: 3px; }

    .machine-zone { min-height: 550px; position: relative; display: grid; place-items: center; padding-top: 10px; }
    .machine-zone::before {
      content: "";
      position: absolute;
      width: min(90%,670px);
      height: 80%;
      bottom: 0;
      border-radius: 50%;
      background: radial-gradient(circle,rgba(255,23,79,.18),rgba(255,107,0,.05) 48%,transparent 70%);
      filter: blur(14px);
      animation: heat 2.6s ease-in-out infinite;
    }
    .machine { width: min(520px,90vw); position: relative; z-index: 2; padding-top: 9px; filter: drop-shadow(0 26px 40px rgba(0,0,0,.65)); }
    .machine-top {
      width: 84%;
      height: 28px;
      margin: 0 auto -5px;
      position: relative;
      z-index: 5;
      border: 3px solid #f7c8a2;
      border-radius: 50%;
      background: linear-gradient(#fff5e7,#7f2435 32%,#2d0a14 70%,#ff9b6b);
      box-shadow: 0 0 18px rgba(255,23,79,.65), inset 0 0 8px #fff;
    }
    .dome {
      width: 78%;
      aspect-ratio: 1.12;
      margin: auto;
      position: relative;
      overflow: hidden;
      border: 5px solid #eeb592;
      border-top: 0;
      border-radius: 15% 15% 46% 46%/5% 5% 20% 20%;
      background:
        linear-gradient(105deg,rgba(255,255,255,.3),transparent 12% 71%,rgba(255,255,255,.12) 78%,transparent 85%),
        radial-gradient(circle at 50% 82%,rgba(255,107,0,.12),rgba(8,6,13,.76) 62%);
      box-shadow: inset 0 -22px 44px rgba(255,23,79,.2), inset 0 0 24px rgba(255,255,255,.12), 0 0 28px rgba(255,23,79,.42);
      backdrop-filter: blur(3px);
    }
    .dome::before { content: ""; position: absolute; z-index: 8; width: 13%; height: 72%; left: 10%; top: 7%; border-radius: 50%; transform: rotate(9deg); background: linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent); filter: blur(2px); }
    .capsule-field { position: absolute; inset: 9% 6% 3%; }
    .capsule {
      --a: #ff174f; --b: #75051f; --x: 30%; --y: 60%; --r: -8deg;
      width: clamp(54px,7.2vw,74px);
      aspect-ratio: 1;
      position: absolute;
      left: var(--x);
      top: var(--y);
      border: 2px solid rgba(255,255,255,.75);
      border-radius: 50%;
      transform: translate(-50%,-50%) rotate(var(--r));
      background:
        linear-gradient(90deg,transparent 46%,rgba(255,255,255,.88) 48% 51%,rgba(0,0,0,.28) 53%,transparent 57%),
        radial-gradient(circle at 32% 24%,#fff 0 4%,rgba(255,255,255,.32) 5% 12%,transparent 13%),
        linear-gradient(var(--a) 0 49%,var(--b) 51%);
      box-shadow: inset -8px -8px 13px rgba(0,0,0,.28),0 5px 12px rgba(0,0,0,.48),0 0 12px var(--a);
      will-change: transform;
    }
    .capsule::after { content: attr(data-short); position: absolute; inset: 0; display: grid; place-items: center; color: rgba(255,255,255,.85); font: 900 .76rem "Malgun Gothic",sans-serif; text-shadow: 0 2px 4px #000; }
    .machine.is-mixing .capsule:nth-child(3n+1) { animation: mix1 .48s linear infinite; }
    .machine.is-mixing .capsule:nth-child(3n+2) { animation: mix2 .42s linear infinite reverse; }
    .machine.is-mixing .capsule:nth-child(3n) { animation: mix3 .54s linear infinite; }
    .machine.is-mixing .dome { animation: shake .13s linear infinite; }

    .machine-base {
      width: 94%;
      min-height: 128px;
      margin: -18px auto 0;
      position: relative;
      z-index: 6;
      display: flex;
      align-items: center;
      padding: 33px 75px 23px 34px;
      border: 4px solid #8a2635;
      border-radius: 10px 10px 28px 28px;
      background: linear-gradient(105deg,rgba(255,255,255,.16),transparent 12% 84%,rgba(255,255,255,.1)),linear-gradient(#581228,#180b15 35%,#2b101c);
      box-shadow: inset 0 0 0 4px #0e070d,inset 0 -12px 22px rgba(0,0,0,.55),0 0 24px rgba(255,23,79,.3);
    }
    .machine-base::before { content: ""; position: absolute; inset: 17px 24px; border: 2px solid rgba(255,182,128,.55); border-radius: 7px 7px 18px 18px; pointer-events: none; }
    .draw-button {
      width: 100%;
      min-height: 68px;
      position: relative;
      z-index: 3;
      border: 3px solid #ffd0b2;
      border-radius: 5px;
      color: #fff9ee;
      background: linear-gradient(100deg,rgba(255,255,255,.22),transparent 23% 80%,rgba(0,0,0,.18)),linear-gradient(#ff3158,#b50733 72%,#68061e);
      box-shadow: inset 0 0 0 3px #59071e,0 7px #53071b,0 0 24px rgba(255,23,79,.48);
      font-size: clamp(1rem,2.1vw,1.55rem);
      font-weight: 950;
      letter-spacing: -.055em;
      text-shadow: 0 3px #6b071e;
      cursor: pointer;
      transform: skew(-3deg);
      transition: .14s var(--snap);
    }
    .draw-button::before, .draw-button::after { content: "⚡"; color: var(--yellow); margin: 0 7px; filter: drop-shadow(0 0 6px var(--orange)); }
    .draw-button:hover:not(:disabled) { filter: brightness(1.14); transform: skew(-3deg) translateY(-2px) scale(1.015); box-shadow: inset 0 0 0 3px #59071e,0 10px #53071b,0 0 34px rgba(255,23,79,.7); }
    .draw-button:active:not(:disabled) { transform: skew(-3deg) translateY(6px); box-shadow: inset 0 0 0 3px #59071e,0 1px #53071b; }
    .draw-button:disabled { color: #776c78; border-color: #554650; background: linear-gradient(#352c35,#1b171d); box-shadow: inset 0 0 0 3px #171218,0 6px #09070a; text-shadow: none; cursor: not-allowed; }
    .lever { width: 42px; height: 116px; position: absolute; z-index: 8; right: 12px; top: -57px; transform-origin: 50% 88%; transform: rotate(26deg); transition: transform .42s var(--snap); }
    .lever::before { content: ""; position: absolute; width: 14px; height: 86px; left: 14px; top: 21px; border: 2px solid #ffe8dd; border-radius: 99px; background: linear-gradient(90deg,#4d1523,#f2b091 48%,#54111f); }
    .lever::after { content: ""; position: absolute; width: 42px; height: 42px; border: 3px solid #ffc0a0; border-radius: 50%; background: radial-gradient(circle at 34% 28%,#fff 0 4%,#ff5a71 8%,#c3083a 50%,#57051c 78%); box-shadow: 0 0 22px rgba(255,23,79,.78); }
    .machine.is-mixing .lever { transform: rotate(150deg); }
    .chute { width: 93px; height: 104px; position: absolute; right: 5.5%; bottom: -77px; z-index: 4; display: grid; place-items: end center; border: 4px solid #9e4052; border-top: 0; border-radius: 0 0 18px 18px; background: linear-gradient(90deg,#130a11,#32111f 48%,#0d080d); box-shadow: inset 0 -9px 18px #000,0 13px 20px rgba(0,0,0,.5); }
    .drop-capsule { --a: var(--hot); --b: #68061e; width: 72px; height: 72px; margin-bottom: 9px; opacity: 0; border: 2px solid rgba(255,255,255,.8); border-radius: 50%; background: linear-gradient(90deg,transparent 47%,#fff 48% 51%,transparent 52%),linear-gradient(var(--a) 0 49%,var(--b) 51%); box-shadow: inset -8px -8px 12px rgba(0,0,0,.28),0 0 20px var(--a); }
    .drop-capsule.is-dropping { animation: drop .95s var(--snap) forwards; }
    .drop-capsule.is-opening { opacity: 1; animation: open .72s var(--snap) forwards; }
    .status-line { position: absolute; left: 50%; bottom: -38px; width: min(450px,92vw); transform: translateX(-50%); color: var(--muted); font: 800 .78rem/1.4 "Malgun Gothic",sans-serif; text-align: center; }
    .status-line strong { color: var(--yellow); }

    .rules { align-self: center; position: relative; padding: 24px 20px; border: 2px solid rgba(255,107,0,.8); background: rgba(9,5,13,.74); box-shadow: 8px 8px rgba(255,23,79,.15); transform: rotate(-1.2deg); }
    .rules::before { content: ""; position: absolute; inset: -9px 8px 8px -8px; z-index: -1; border: 1px solid rgba(244,8,125,.6); transform: rotate(2deg); }
    .rules h2 { margin: 0 0 20px; color: var(--hot); font-size: 1.16rem; text-align: center; }
    .rules ol { margin: 0; padding: 0; display: grid; gap: 15px; list-style: none; counter-reset: rules; }
    .rules li { min-height: 52px; display: grid; grid-template-columns: 34px 1fr; gap: 9px; align-items: center; color: #dfd4df; font: 900 .8rem/1.35 "Malgun Gothic",sans-serif; counter-increment: rules; }
    .rules li::before { content: counter(rules); width: 31px; height: 31px; display: grid; place-items: center; color: #030207; background: var(--yellow); font: 900 1rem Impact,sans-serif; transform: rotate(-5deg); }

    .result-layer { position: fixed; inset: 0; z-index: 30; display: grid; place-items: center; padding: 24px; opacity: 0; visibility: hidden; background: radial-gradient(circle,rgba(255,107,0,.25),transparent 42%),rgba(3,2,7,.87); backdrop-filter: blur(8px); transition: .25s ease; }
    .result-layer.is-visible { opacity: 1; visibility: visible; }
    .impact-lines { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .impact-lines::before { content: ""; position: absolute; width: 120vmax; height: 120vmax; left: 50%; top: 50%; transform: translate(-50%,-50%); background: repeating-conic-gradient(from 4deg,rgba(255,23,79,.52) 0 1deg,transparent 1.5deg 6deg); mask-image: radial-gradient(circle,transparent 0 16%,black 17% 54%,transparent 75%); animation: spin 14s linear infinite; }
    .result-card { width: min(560px,94vw); position: relative; z-index: 2; text-align: center; transform: scale(.55) rotate(-7deg); transition: transform .62s var(--snap); }
    .result-layer.is-visible .result-card { transform: scale(1) rotate(-1deg); }
    .result-kicker { margin: 0 0 14px; color: var(--yellow); font-size: .9rem; letter-spacing: .18em; text-shadow: 0 0 16px var(--orange); }
    .result-capsule { width: 190px; height: 86px; margin: 0 auto -27px; position: relative; z-index: 3; }
    .result-capsule::before, .result-capsule::after { content: ""; position: absolute; top: 0; width: 86px; height: 86px; border: 3px solid rgba(255,255,255,.8); border-radius: 50%; background: radial-gradient(circle at 28% 25%,#fff 0 4%,var(--result-color,var(--hot)) 8% 58%,#52051a 78%); box-shadow: 0 0 28px var(--result-color,var(--hot)); }
    .result-capsule::before { left: 0; transform: translateX(-18px) rotate(-19deg); }
    .result-capsule::after { right: 0; transform: translateX(18px) rotate(19deg); }
    .paper { min-height: 225px; position: relative; display: grid; place-items: center; padding: 38px 34px; color: #120a0d; background: linear-gradient(100deg,rgba(98,61,29,.1),transparent 24% 72%,rgba(98,61,29,.12)),#fff4dc; clip-path: polygon(2% 8%,9% 2%,17% 5%,27% 1%,37% 5%,47% 0,58% 4%,69% 1%,80% 5%,91% 1%,98% 8%,96% 19%,100% 29%,97% 39%,100% 49%,96% 60%,99% 72%,95% 81%,98% 92%,88% 97%,76% 94%,65% 99%,53% 95%,42% 100%,30% 96%,18% 99%,7% 94%,3% 83%,6% 72%,1% 61%,5% 49%,1% 38%,5% 27%); filter: drop-shadow(0 18px 28px rgba(0,0,0,.58)); }
    .paper::before { content: "TODAY'S TARGET"; position: absolute; left: 50%; top: 30px; transform: translateX(-50%) rotate(-2deg); color: var(--hot); font: 900 .72rem Impact,sans-serif; letter-spacing: .22em; }
    .result-name { font-family: Impact,"Arial Black","Malgun Gothic",sans-serif; font-size: clamp(4.6rem,16vw,8.4rem); line-height: .9; letter-spacing: -.08em; text-shadow: 4px 4px rgba(255,23,79,.22); }
    .result-copy { position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%); width: 90%; margin: 0; font: 900 .82rem/1.35 "Malgun Gothic",sans-serif; }
    .result-actions { margin-top: 24px; display: flex; justify-content: center; gap: 10px; }
    .again-button, .close-result { min-height: 48px; padding: 0 20px; border: 2px solid transparent; border-radius: 4px; font: 900 .9rem "Malgun Gothic",sans-serif; cursor: pointer; }
    .again-button { color: #fff; border-color: #ffc0a0; background: linear-gradient(#ff3158,#ad0731); box-shadow: 0 5px #58051a,0 0 22px rgba(255,23,79,.48); }
    .close-result { color: var(--cyan); border-color: rgba(9,217,238,.48); background: #0c0a11; }
    .spark { --x: 0px; --y: 0px; width: 6px; height: 18px; position: fixed; left: 50%; top: 50%; z-index: 40; border-radius: 99px; background: var(--c,var(--yellow)); box-shadow: 0 0 10px var(--c,var(--yellow)); pointer-events: none; animation: burst 1s ease-out forwards; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    @keyframes heat { 50% { transform: scale(1.08); opacity: .72; } }
    @keyframes mix1 { 0% { transform: translate(-50%,-50%) rotate(var(--r)); } 33% { transform: translate(calc(-50% + 25px),calc(-50% - 38px)) rotate(120deg); } 66% { transform: translate(calc(-50% - 28px),calc(-50% + 12px)) rotate(240deg); } 100% { transform: translate(-50%,-50%) rotate(calc(var(--r) + 360deg)); } }
    @keyframes mix2 { 0% { transform: translate(-50%,-50%) rotate(var(--r)); } 50% { transform: translate(calc(-50% + 42px),calc(-50% + 15px)) rotate(190deg); } 100% { transform: translate(-50%,-50%) rotate(calc(var(--r) + 360deg)); } }
    @keyframes mix3 { 0% { transform: translate(-50%,-50%) rotate(var(--r)); } 45% { transform: translate(calc(-50% - 38px),calc(-50% - 18px)) rotate(-170deg); } 100% { transform: translate(-50%,-50%) rotate(calc(var(--r) - 360deg)); } }
    @keyframes shake { 25% { transform: translate(2px,-1px) rotate(.25deg); } 75% { transform: translate(-2px,1px) rotate(-.25deg); } }
    @keyframes drop { 0% { opacity: 0; transform: translateY(-240px) scale(.75); } 58% { opacity: 1; transform: translateY(0) scale(1.06) rotate(420deg); } 76% { transform: translateY(-18px) scale(.98) rotate(470deg); } 100% { opacity: 1; transform: translateY(0) rotate(510deg); } }
    @keyframes open { 45% { transform: scale(1.28) rotate(-8deg); filter: brightness(2); } 100% { transform: scale(1.8); filter: brightness(3); opacity: 0; } }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes burst { from { opacity: 1; transform: translate(-50%,-50%) scaleY(.5); } to { opacity: 0; transform: translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scaleY(1.4) rotate(430deg); } }

    @media (max-width:1120px) {
      .layout { grid-template-columns: minmax(220px,.7fr) minmax(510px,1.5fr); }
      .rules { display: none; }
    }
    @media (max-width:820px) {
      .app { padding-inline: 16px; }
      .layout { display: flex; flex-direction: column; align-items: stretch; padding-top: 26px; }
      .intro { min-height: auto; padding: 0; text-align: center; }
      h1 { max-width: none; font-size: clamp(3.4rem,13vw,6.2rem); }
      h1 span { display: inline; }
      .intro-copy { width: min(580px,100%); margin: 18px auto 0; }
      .candidate-box { width: min(460px,100%); margin: 18px auto 4px; }
      .candidate-list { justify-content: center; }
      .selector { width: min(640px,100%); margin: auto; }
      .machine-zone { min-height: 570px; }
    }
    @media (max-width:560px) {
      .app { padding-inline: 12px; }
      .topbar { min-height: 50px; }
      .brand { font-size: .68rem; }
      .brand-mark { width: 29px; height: 29px; }
      .hub-link { font-size: .76rem; }
      .layout { gap: 25px; }
      h1 { font-size: clamp(3.25rem,18vw,5.4rem); line-height: .92; }
      .intro-copy { font-size: .84rem; }
      .selector-head { align-items: center; }
      .selector h2 { max-width: 250px; }
      .workout-options { grid-template-columns: repeat(2,1fr); gap: 8px; }
      .workout-button { min-height: 64px; font-size: 1.12rem; }
      .machine-zone { min-height: 465px; padding-top: 0; }
      .machine { width: min(390px,104vw); transform: scale(.9); }
      .capsule { width: clamp(45px,14vw,60px); }
      .machine-base { min-height: 116px; padding: 31px 63px 23px 27px; }
      .draw-button { min-height: 60px; font-size: .98rem; }
      .chute { right: 4%; }
      .status-line { bottom: -45px; }
      .result-actions { flex-direction: column; }
      .again-button, .close-result { width: 100%; }
    }
    @media (max-width:380px) {
      .brand span:last-child { display: none; }
      .machine-zone { min-height: 440px; }
      .machine { width: 370px; transform: scale(.84); }
    }
    @media (prefers-reduced-motion:reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" href="./health.html" aria-label="운동 부위 가챠 처음으로"><span class="brand-mark" aria-hidden="true"></span><span>WORKOUT GACHA</span></a>
      <a class="hub-link" href="./index.html"><span aria-hidden="true">←</span> 허브로 돌아가기</a>
    </header>

    <main class="layout">
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">오늘 어디 <span>조질까?</span></h1>
        <p class="intro-copy">최근에 한 운동은 빼고, 남은 부위 중 오늘 불태울 한 곳을 캡슐이 결정한다.</p>
        <div class="candidate-box" aria-live="polite">
          <span class="candidate-label">현재 뽑기 후보</span>
          <div class="candidate-list" id="candidateList"></div>
        </div>
      </section>

      <section class="game" aria-label="운동 부위 가챠">
        <div class="selector">
          <div class="selector-head">
            <h2>최근에 한 운동을 <em>모두 골라</em></h2>
            <button class="reset-button" id="resetButton" type="button">선택 초기화</button>
          </div>
          <div class="workout-options" id="workoutOptions" aria-label="최근 운동 선택"></div>
        </div>

        <div class="machine-zone">
          <div class="machine" id="machine">
            <div class="machine-top" aria-hidden="true"></div>
            <div class="dome" aria-hidden="true"><div class="capsule-field" id="capsuleField"></div></div>
            <div class="machine-base">
              <button class="draw-button" id="drawButton" type="button">운명의 캡슐 뽑기</button>
              <span class="lever" aria-hidden="true"></span>
              <div class="chute" aria-hidden="true"><div class="drop-capsule" id="dropCapsule"></div></div>
            </div>
            <p class="status-line" id="statusLine"><strong>최근 운동</strong>을 누르면 뽑기 후보에서 제외돼</p>
          </div>
        </div>
      </section>

      <aside class="rules" aria-label="뽑기 순서">
        <h2>뽑기 순서</h2>
        <ol>
          <li>최근 운동을 모두 선택해 제외</li>
          <li>운명의 캡슐 버튼을 강하게 누르기</li>
          <li>쪽지에 적힌 오늘의 운동 공개</li>
        </ol>
      </aside>
    </main>
  </div>

  <section class="result-layer" id="resultLayer" aria-hidden="true" aria-labelledby="resultName" role="dialog" aria-modal="true">
    <div class="impact-lines" aria-hidden="true"></div>
    <div class="result-card">
      <p class="result-kicker">운명이 정한 오늘의 운동</p>
      <div class="result-capsule" id="resultCapsule" aria-hidden="true"></div>
      <div class="paper">
        <strong class="result-name" id="resultName">등</strong>
        <p class="result-copy" id="resultCopy">핑계 금지. 오늘은 등을 끝까지 불태운다.</p>
      </div>
      <div class="result-actions">
        <button class="again-button" id="againButton" type="button">한 번 더 뽑기</button>
        <button class="close-result" id="closeResult" type="button">결과 닫기</button>
      </div>
    </div>
  </section>
  <p class="sr-only" id="announcer" aria-live="assertive"></p>

  <script>
    (() => {
      "use strict";
      const workouts = [
        { id:"legs", label:"하체", short:"하", color:"#ff8a00", dark:"#7c2800", copy:"하체는 배신하지 않는다. 오늘은 다리로 증명한다." },
        { id:"chest", label:"가슴", short:"가", color:"#ff174f", dark:"#75051f", copy:"가슴을 활짝 열고 마지막 한 세트까지 밀어붙인다." },
        { id:"back", label:"등", short:"등", color:"#09d9ee", dark:"#075b72", copy:"핑계 금지. 오늘은 등을 끝까지 불태운다." },
        { id:"shoulders", label:"어깨", short:"어", color:"#ed19cf", dark:"#6f075f", copy:"어깨에 불을 켜고 한계보다 한 번 더 들어 올린다." }
      ];
      const positions = [[11,77,-16],[28,76,14],[46,78,-7],[64,76,21],[82,77,-11],[19,60,18],[38,59,-20],[57,61,7],[75,58,-13],[88,60,24],[29,43,-9],[49,44,17],[68,42,-22],[48,26,11]];
      const selected = new Set();
      const $ = (id) => document.getElementById(id);
      const options = $("workoutOptions");
      const candidateList = $("candidateList");
      const capsuleField = $("capsuleField");
      const machine = $("machine");
      const drawButton = $("drawButton");
      const dropCapsule = $("dropCapsule");
      const statusLine = $("statusLine");
      const resultLayer = $("resultLayer");
      const resultName = $("resultName");
      const resultCopy = $("resultCopy");
      const resultCapsule = $("resultCapsule");
      const announcer = $("announcer");
      const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)");
      let isDrawing = false;
      let lastWinner = null;

      const candidates = () => workouts.filter((workout) => !selected.has(workout.id));
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, reduceMotion.matches ? Math.min(ms,80) : ms));

      function announce(message) {
        announcer.textContent = "";
        requestAnimationFrame(() => { announcer.textContent = message; });
      }

      function makeOptions() {
        workouts.forEach((workout,index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "workout-button";
          button.dataset.id = workout.id;
          button.dataset.index = String(index + 1).padStart(2,"0");
          button.setAttribute("aria-pressed","false");
          button.setAttribute("aria-label",`${workout.label}, 최근 운동으로 선택하면 뽑기에서 제외`);
          button.textContent = workout.label;
          button.addEventListener("click",() => toggle(workout.id));
          options.appendChild(button);
        });
      }

      function renderCapsules(pool) {
        capsuleField.replaceChildren();
        positions.forEach(([x,y,r],index) => {
          if (!pool.length) return;
          const workout = pool[index % pool.length];
          const capsule = document.createElement("span");
          capsule.className = "capsule";
          capsule.dataset.short = workout.short;
          capsule.style.cssText = `--x:${x}%;--y:${y}%;--r:${r}deg;--a:${workout.color};--b:${workout.dark}`;
          capsuleField.appendChild(capsule);
        });
      }

      function render() {
        const pool = candidates();
        options.querySelectorAll("button").forEach((button) => button.setAttribute("aria-pressed",String(selected.has(button.dataset.id))));
        candidateList.replaceChildren();
        (pool.length ? pool : [{label:"후보 없음",color:"#ff174f"}]).forEach((workout) => {
          const item = document.createElement("span");
          item.textContent = workout.label;
          item.style.color = workout.color;
          candidateList.appendChild(item);
        });
        drawButton.disabled = isDrawing || !pool.length;
        drawButton.textContent = pool.length ? (isDrawing ? "캡슐 섞는 중" : "운명의 캡슐 뽑기") : "후보를 하나 남겨줘";
        statusLine.innerHTML = pool.length ? `<strong>${pool.length}개 후보</strong> 중 하나가 오늘의 운동이 된다` : `<strong>뽑기 불가</strong> · 최소 한 부위는 후보로 남겨줘`;
        renderCapsules(pool);
      }

      function toggle(id) {
        if (isDrawing) return;
        hideResult();
        selected.has(id) ? selected.delete(id) : selected.add(id);
        render();
      }

      function sparks(count=38) {
        const colors = ["#ffd323","#ff6b00","#ff174f","#f4087d","#09d9ee"];
        for (let i=0;i<count;i+=1) {
          const angle = Math.PI * 2 * i / count + Math.random() * .24;
          const distance = 90 + Math.random() * Math.min(innerWidth,360);
          const spark = document.createElement("span");
          spark.className = "spark";
          spark.style.cssText = `--x:${Math.cos(angle)*distance}px;--y:${Math.sin(angle)*distance}px;--c:${colors[i%colors.length]};animation-delay:${Math.random()*.12}s`;
          document.body.appendChild(spark);
          setTimeout(() => spark.remove(),1200);
        }
      }

      function setWinner(workout) {
        dropCapsule.style.setProperty("--a",workout.color);
        dropCapsule.style.setProperty("--b",workout.dark);
        resultCapsule.style.setProperty("--result-color",workout.color);
        resultName.textContent = workout.label;
        resultCopy.textContent = workout.copy;
      }

      async function draw() {
        const pool = candidates();
        if (isDrawing || !pool.length) return;
        hideResult();
        isDrawing = true;
        lastWinner = pool[Math.floor(Math.random()*pool.length)];
        setWinner(lastWinner);
        render();
        machine.classList.add("is-mixing");
        announce("캡슐을 섞고 있습니다.");
        await wait(1900);
        machine.classList.remove("is-mixing");
        dropCapsule.className = "drop-capsule is-dropping";
        statusLine.innerHTML = "<strong>캡슐 낙하!</strong> · 운명이 내려오는 중";
        announce("캡슐 하나가 선택되어 떨어집니다.");
        await wait(1050);
        dropCapsule.className = "drop-capsule is-opening";
        sparks();
        await wait(620);
        showResult();
        isDrawing = false;
        render();
      }

      function showResult() {
        resultLayer.classList.add("is-visible");
        resultLayer.setAttribute("aria-hidden","false");
        document.body.style.overflow = "hidden";
        announce(`오늘의 운동은 ${lastWinner.label}입니다.`);
        setTimeout(() => $("againButton").focus(),reduceMotion.matches ? 20 : 400);
      }

      function hideResult() {
        resultLayer.classList.remove("is-visible");
        resultLayer.setAttribute("aria-hidden","true");
        document.body.style.overflow = "";
        dropCapsule.className = "drop-capsule";
      }

      drawButton.addEventListener("click",draw);
      $("againButton").addEventListener("click",() => { hideResult(); drawButton.focus(); draw(); });
      $("closeResult").addEventListener("click",() => { hideResult(); drawButton.focus(); });
      $("resetButton").addEventListener("click",() => {
        if (isDrawing) return;
        selected.clear();
        lastWinner = null;
        hideResult();
        render();
        announce("최근 운동 선택을 모두 초기화했습니다.");
      });
      resultLayer.addEventListener("click",(event) => { if (event.target === resultLayer) { hideResult(); drawButton.focus(); } });
      addEventListener("keydown",(event) => { if (event.key === "Escape" && resultLayer.classList.contains("is-visible")) { hideResult(); drawButton.focus(); } });
      makeOptions();
      render();
    })();
  </script>
</body>
</html>
