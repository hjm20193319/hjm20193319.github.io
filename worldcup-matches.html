<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>대진표 | 2026 북중미 월드컵</title>
    <link rel="stylesheet" href="./worldcup.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./worldcup.html">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>2026 북중미 월드컵</span>
      </a>
      <nav class="nav" aria-label="월드컵 메뉴">
        <a class="is-active" href="./worldcup-matches.html">대진표</a>
        <a href="./worldcup-groups.html">진출 가능성</a>
        <a href="./worldcup-squads.html">스쿼드</a>
        <a href="./worldcup-records.html">개인 기록</a>
      </nav>
    </header>

    <main class="page">
      <div class="page-head">
        <h1>대진표</h1>
        <a class="back-link" href="./worldcup.html">월드컵</a>
      </div>

      <section class="stage-board" aria-label="현재 단계">
        <div>
          <span class="tiny-label">Current Round</span>
          <strong id="currentRound">조별리그</strong>
        </div>
        <div>
          <span class="tiny-label">Matchday</span>
          <strong id="currentMatchday">Matchday 1</strong>
        </div>
        <div>
          <span class="tiny-label">Knockout</span>
          <strong id="knockoutState">32강 전</strong>
        </div>
        <div>
          <span class="tiny-label">Completed</span>
          <strong id="completedCount">0/72</strong>
        </div>
      </section>

      <section class="panel group-browser">
        <div class="tabs" id="groupTabs" aria-label="조 선택"></div>
        <div class="group-summary" id="groupSummary"></div>
      </section>

      <section class="match-layout detailed">
        <aside class="rail">
          <div class="rail-head">
            <h2 id="fixtureTitle">Group A 경기</h2>
          </div>
          <div class="match-list" id="matchList"></div>
        </aside>
        <article class="detail-panel" id="matchDetail" aria-live="polite"></article>
      </section>
    </main>

    <script type="module">
      import { buildStandings, completedMatches, groupTeams, matches, stageInfo } from "./worldcup-data.js";

      let selectedGroup = "A";
      let selectedMatch = matches.find((item) => item.group === selectedGroup)?.id ?? matches[0].id;

      function scoreText(match) {
        return match.score ? `${match.score[0]}-${match.score[1]}` : "vs";
      }

      function diffText(row) {
        const diff = row[4] - row[5];
        return diff > 0 ? `+${diff}` : `${diff}`;
      }

      function renderStage() {
        document.getElementById("currentRound").textContent = stageInfo.round;
        document.getElementById("currentMatchday").textContent = stageInfo.matchday;
        document.getElementById("knockoutState").textContent = stageInfo.knockout;
        document.getElementById("completedCount").textContent = `${completedMatches().length}/${matches.length}`;
      }

      function renderGroupTabs() {
        const tabs = document.getElementById("groupTabs");
        tabs.innerHTML = Object.keys(groupTeams).map((group) => `
          <button class="${group === selectedGroup ? "is-active" : ""}" type="button" data-group="${group}">Group ${group}</button>
        `).join("");
        tabs.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            selectedGroup = button.dataset.group;
            selectedMatch = matches.find((item) => item.group === selectedGroup)?.id;
            renderAll();
          });
        });
      }

      function renderGroupSummary() {
        const standings = buildStandings(selectedGroup);
        const groupMatches = matches.filter((item) => item.group === selectedGroup);
        const done = groupMatches.filter((item) => item.score).length;
        document.getElementById("groupSummary").innerHTML = `
          <div class="group-current">
            <span class="tiny-label">Group ${selectedGroup}</span>
            <b>${done}/6 경기 완료</b>
          </div>
          <div class="standings-wrap">
            <table class="standings rich">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>국가</th>
                  <th>경기</th>
                  <th>승</th>
                  <th>무</th>
                  <th>패</th>
                  <th>득점</th>
                  <th>실점</th>
                  <th>득실</th>
                  <th>승점</th>
                </tr>
              </thead>
              <tbody>
                ${standings.map((row, index) => `
                  <tr>
                    <td>${index + 1}</td>
                    <td>${row[0]}</td>
                    <td>${row[1] + row[2] + row[3]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                    <td>${row[4]}</td>
                    <td>${row[5]}</td>
                    <td>${diffText(row)}</td>
                    <td><b>${row[6]}</b></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderMatches() {
        const groupMatches = matches.filter((item) => item.group === selectedGroup);
        document.getElementById("fixtureTitle").textContent = `Group ${selectedGroup} 경기`;
        document.getElementById("matchList").innerHTML = groupMatches.map((match) => `
          <button class="match-button ${match.id === selectedMatch ? "is-active" : ""}" type="button" data-match="${match.id}">
            <span class="match-meta">MD${match.matchday} · ${match.date} · ${match.status}</span>
            <span class="match-teams"><span>${match.home}</span><span class="score">${scoreText(match)}</span><span>${match.away}</span></span>
            <span class="match-meta">${match.stadium}</span>
          </button>
        `).join("");

        document.querySelectorAll("[data-match]").forEach((button) => {
          button.addEventListener("click", () => {
            selectedMatch = button.dataset.match;
            renderMatches();
            renderMatchDetail();
          });
        });
      }

      function renderMatchDetail() {
        const match = matches.find((item) => item.id === selectedMatch);
        const score = match.score ? `${match.score[0]} : ${match.score[1]}` : "킥오프 대기";
        document.getElementById("matchDetail").innerHTML = `
          <div class="detail-hero">
            <span class="status-tag">Group ${match.group} · Matchday ${match.matchday} · ${match.status}</span>
            <div class="versus">
              <div class="team-block">
                <div class="team-name">${match.home}</div>
              </div>
              <div class="vs-score">${score}</div>
              <div class="team-block">
                <div class="team-name">${match.away}</div>
              </div>
            </div>
          </div>
          <div class="metric-strip">
            <div class="metric"><b>${match.date}</b><span>날짜</span></div>
            <div class="metric"><b>MD${match.matchday}</b><span>매치데이</span></div>
            <div class="metric"><b>${match.group}</b><span>조</span></div>
            <div class="metric"><b>${match.status}</b><span>상태</span></div>
          </div>
          <div class="detail-grid">
            <section>
              <h3>경기 정보</h3>
              <ul class="fact-list">
                <li><span class="tiny-label">스타디움</span><b>${match.stadium}</b></li>
                <li><span class="tiny-label">스코어</span><b>${scoreText(match)}</b></li>
                <li><span class="tiny-label">결과 반영</span><b>${match.score ? "순위표 반영" : "대기"}</b></li>
              </ul>
            </section>
            <section>
              <h3>기록</h3>
              <ul class="event-list">
                ${match.events.map((event) => `<li><span class="tiny-label">${event.split(" ")[0]}</span><b>${event.replace(event.split(" ")[0], "").trim()}</b></li>`).join("")}
              </ul>
            </section>
          </div>
        `;
      }

      function renderAll() {
        renderStage();
        renderGroupTabs();
        renderGroupSummary();
        renderMatches();
        renderMatchDetail();
      }

      renderAll();
    </script>
  </body>
</html>
